<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCED FARHA Feedback Form</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: #eef1f5;
      min-height: 100vh;
      padding: 40px 15px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 35px 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    .topbar {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 10px;
      color: #2563eb;
      font-size: 15px;
      cursor: pointer;
    }

    .logo {
      display: block;
      width: 120px;
      margin: 0 auto 18px;
    }

    .site-name {
      text-align: center;
      color: #16a34a;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .title {
      text-align: center;
      color: #2b5dab;
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 24px;
      font-weight: 700;
      margin: 28px 0 18px;
      color: #111827;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 600;
      color: #111827;
    }

    .required {
      color: #dc2626;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      background: #fff;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #2b5dab;
      box-shadow: 0 0 0 3px rgba(43, 93, 171, 0.12);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .submit-btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(90deg, #16a34a, #2563eb);
      margin-top: 10px;
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      display: none;
      font-size: 15px;
      text-align: center;
    }

    .success {
      background: #dcfce7;
      color: #166534;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
    }

    .hidden-field {
      display: none;
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px 18px;
      }

      .title {
        font-size: 24px;
      }

      .site-name {
        font-size: 22px;
      }

      label {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="topbar">🌐 EN / AR</div>

    <img
      class="logo"
      src="https://sakanoman.om/files/images/a8f7324ee2d9956f2f1e44022b4d2cda.png"
      alt="SAKAN Logo"
    >

    <div class="site-name">CCED FARHA</div>
    <div class="title">استمارة الاقتراحات والشكاوى</div>

    <form id="feedbackForm">
      <input type="hidden" id="location" value="CCED FARHA" class="hidden-field">

      <div class="field">
        <label for="priority">1. الفئة <span class="required">*</span></label>
        <select id="priority" required>
          <option value="">اختر مستوى الأهمية</option>
          <option value="Low">منخفض</option>
          <option value="Medium">متوسط</option>
          <option value="High">عالي</option>
        </select>
      </div>

      <div class="field">
        <label for="issueType">2. نوع المشكلة <span class="required">*</span></label>
        <select id="issueType" required>
          <option value="">اختر نوع المشكلة</option>
          <option value="Housekeeping">Housekeeping</option>
          <option value="Maintenance">Maintenance</option>
          <option value="Catering">Catering</option>
          <option value="Laundry">Laundry</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="field">
        <label for="comments">3. وصف المشكلة <span class="required">*</span></label>
        <textarea id="comments" placeholder="اكتب التفاصيل هنا" required></textarea>
      </div>

      <div class="field">
        <label for="department">الموقع / القسم (اختياري)</label>
        <input type="text" id="department" placeholder="مثال: المبنى A أو المطبخ أو السكن">
      </div>

      <div class="section-title">4. معلومات التواصل</div>

      <div class="field">
        <label for="name">الاسم <span class="required">*</span></label>
        <input type="text" id="name" placeholder="أدخل الاسم" required>
      </div>

      <div class="field">
        <label for="phone">رقم الهاتف <span class="required">*</span></label>
        <input type="text" id="phone" placeholder="أدخل رقم الهاتف" required>
      </div>

      <div class="field">
        <label for="roomNo">رقم الغرفة (اختياري)</label>
        <input type="text" id="roomNo" placeholder="أدخل رقم الغرفة">
      </div>

      <div class="field">
        <label for="email">البريد الإلكتروني (اختياري)</label>
        <input type="email" id="email" placeholder="أدخل البريد الإلكتروني">
      </div>

      <div class="field">
        <label for="employeeNo">الرقم الوظيفي (اختياري)</label>
        <input type="text" id="employeeNo" placeholder="أدخل الرقم الوظيفي">
      </div>

      <button type="submit" id="submitBtn" class="submit-btn">إرسال البلاغ</button>
    </form>

    <div id="successMessage" class="message success">تم إرسال البلاغ بنجاح</div>
    <div id="errorMessage" class="message error">حدث خطأ أثناء الإرسال</div>
  </div>

  <script>
    const API = "https://sakan-feedback-app.onrender.com";

    const feedbackForm = document.getElementById("feedbackForm");
    const submitBtn = document.getElementById("submitBtn");
    const successMessage = document.getElementById("successMessage");
    const errorMessage = document.getElementById("errorMessage");

    function resetMessages() {
      successMessage.style.display = "none";
      errorMessage.style.display = "none";
    }

    feedbackForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      resetMessages();

      const payload = {
        location: "CCED FARHA",
        priority: document.getElementById("priority").value,
        issueType: document.getElementById("issueType").value,
        comments: document.getElementById("comments").value.trim(),
        department: document.getElementById("department").value.trim(),
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        roomNo: document.getElementById("roomNo").value.trim(),
        email: document.getElementById("email").value.trim(),
        employeeNo: document.getElementById("employeeNo").value.trim()
      };

      if (!payload.priority || !payload.issueType || !payload.comments || !payload.name || !payload.phone) {
        errorMessage.textContent = "يرجى تعبئة جميع الحقول المطلوبة";
        errorMessage.style.display = "block";
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "جاري الإرسال...";

      try {
        const res = await fetch(`${API}/feedback`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name: payload.name,
            location: payload.location,
            comments: payload.comments,
            category: payload.issueType,
            rating: payload.priority,
            phone: payload.phone,
            email: payload.email,
            room_no: payload.roomNo,
            employee_no: payload.employeeNo,
            department: payload.department
          })
        });

        const result = await res.json();

        if (!res.ok) {
          throw new Error(result.message || "Failed to submit feedback");
        }

        successMessage.style.display = "block";
        feedbackForm.reset();
      } catch (error) {
        console.error(error);
        errorMessage.textContent = "فشل إرسال البيانات، حاول مرة أخرى";
        errorMessage.style.display = "block";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "إرسال البلاغ";
      }
    });
  </script>
</body>
</html>
