<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCED FARHA Feedback Form</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: #f3f4f6;
      padding: 30px 15px;
    }

    .container {
      max-width: 650px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 30px 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    .logo {
      display: block;
      width: 120px;
      margin: 0 auto 20px;
    }

    h1, h2, p {
      text-align: center;
      margin: 0 0 15px;
    }

    h2 {
      color: #16a34a;
      font-size: 24px;
    }

    p.subtitle {
      color: #2b5dab;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 130px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #16a34a, #2563eb);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      display: none;
      text-align: center;
    }

    .success {
      background: #dcfce7;
      color: #166534;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
    }

    .site-badge {
      text-align: center;
      color: #16a34a;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .hidden-field {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="https://sakanoman.om/files/images/a8f7324ee2d9956f2f1e44022b4d2cda.png" alt="SAKAN Logo">

    <div class="site-badge">CCED FARHA</div>
    <p class="subtitle">استمارة الاقتراحات والشكاوى</p>

    <form id="feedbackForm">
      <input type="hidden" id="location" value="CCED FARHA" class="hidden-field">

      <label for="name">الاسم</label>
      <input type="text" id="name" placeholder="أدخل الاسم">

      <label for="comments">وصف المشكلة / الاقتراح <span style="color:red">*</span></label>
      <textarea id="comments" placeholder="اكتب التفاصيل هنا" required></textarea>

      <button type="submit" id="submitBtn">إرسال</button>
    </form>

    <div id="successMessage" class="message success">تم إرسال الشكوى بنجاح</div>
    <div id="errorMessage" class="message error">حدث خطأ أثناء الإرسال</div>
  </div>

  <script>
    const API = "https://sakan-feedback-app.onrender.com";

    const feedbackForm = document.getElementById("feedbackForm");
    const submitBtn = document.getElementById("submitBtn");
    const successMessage = document.getElementById("successMessage");
    const errorMessage = document.getElementById("errorMessage");

    function resetMessages() {
      successMessage.style.display = "none";
      errorMessage.style.display = "none";
    }

    feedbackForm.addEventListener("submit", async function (e) {
      e.preventDefault();
      resetMessages();

      const name = document.getElementById("name").value.trim();
      const location = document.getElementById("location").value.trim();
      const comments = document.getElementById("comments").value.trim();

      if (!comments) {
        errorMessage.textContent = "يرجى كتابة وصف المشكلة أو الاقتراح";
        errorMessage.style.display = "block";
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "جاري الإرسال...";

      try {
        const res = await fetch(`${API}/feedback`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name,
            location,
            comments
          })
        });

        const result = await res.json();

        if (!res.ok) {
          throw new Error(result.message || "Failed to submit feedback");
        }

        successMessage.style.display = "block";
        feedbackForm.reset();

        // إعادة تعيين الموقع الثابت بعد reset
        document.getElementById("location").value = "CCED FARHA";

      } catch (error) {
        console.error(error);
        errorMessage.textContent = "فشل إرسال البيانات، حاول مرة أخرى";
        errorMessage.style.display = "block";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "إرسال";
      }
    });
  </script>
</body>
</html>
