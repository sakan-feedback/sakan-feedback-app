<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDO YIBAL MOTEL Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:"Segoe UI"; background:#f4f6f9; display:flex; }

.sidebar {
  width:240px; background:#2b5dab; color:white;
  height:100vh; position:fixed; padding:20px;
}

.sidebar img {
  width:120px; background:white; padding:8px;
  border-radius:10px; margin-bottom:30px;
}

.sidebar a {
  display:block; padding:12px; margin-bottom:10px;
  border-radius:8px; cursor:pointer;
}

.sidebar a:hover,.sidebar a.active { background:#16a34a; }

.main { margin-left:240px; width:100%; }

.header {
  background:white; padding:15px 20px;
  display:flex; justify-content:space-between; align-items:center;
}

.logout {
  background:#16a34a; color:white;
  border:none; padding:8px 15px;
  border-radius:6px; cursor:pointer;
}

.lang { cursor:pointer; color:#2b5dab; font-weight:bold; }

.content { padding:20px; }

.cards { display:flex; gap:20px; margin-bottom:20px; }

.card {
  flex:1; background:white; padding:20px;
  border-radius:12px; text-align:center;
}

table {
  width:100%; background:white;
  border-collapse:collapse; border-radius:12px; overflow:hidden;
}

th { background:#2b5dab; color:white; padding:12px; }

td {
  padding:10px; border-bottom:1px solid #eee; text-align:center;
}
</style>
</head>

<body>

<div class="sidebar">
  <img src="https://sakanoman.om/files/images/a8f7324ee2d9956f2f1e44022b4d2cda.png">
  <a class="active" onclick="showPage('dashboard',this)">Dashboard</a>
  <a onclick="showPage('feedback',this)">Feedback</a>
  <a onclick="showPage('reports',this)">Reports</a>
</div>

<div class="main">

<div class="header">
  <h2>📊 PDO YIBAL MOTEL Dashboard</h2>
  <div>
    <span class="lang" onclick="toggleLang()">EN / AR</span>
    <button class="logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="content">

<!-- Dashboard -->
<div id="dashboardPage">
  <div class="cards">
    <div class="card">
      <h3>عدد الطلبات</h3>
      <p id="total">0</p>
    </div>
    <div class="card">
      <h3>آخر موقع</h3>
      <p id="lastLocation">-</p>
    </div>
  </div>

  <canvas id="chart"></canvas>
</div>

<!-- Feedback -->
<div id="feedbackPage" style="display:none;">
  <h2>📋 جميع الشكاوى</h2>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>الاسم</th>
        <th>الموقع</th>
        <th>التعليق</th>
        <th>التاريخ</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>
</div>

<!-- Reports -->
<div id="reportsPage" style="display:none;">
  <h2>📊 التقارير</h2>

  <div class="cards">
    <div class="card">
      <h3>حسب الموقع</h3>
      <canvas id="locationChart"></canvas>
    </div>

    <div class="card">
      <h3>يومي</h3>
      <canvas id="dateChart"></canvas>
    </div>
  </div>

  <div class="card">
    <h3>مقارنة</h3>
    <canvas id="barChart"></canvas>
  </div>
</div>

</div>
</div>

<script>

// حماية الدخول
if(localStorage.getItem("loggedIn")!=="true"){
  window.location.href="login.html";
}

function logout(){
  localStorage.removeItem("loggedIn");
  window.location.href="login.html";
}

let allData=[];

// ✅ تحميل البيانات
async function loadData() {
  const res = await fetch(
    "https://sakan-feedback-app.onrender.com/feedback/PDO YIBAL MOTEL"
  );
  const data = await res.json();

  allData = data;
  displayData(data);

  document.getElementById("total").innerText = data.length;
  document.getElementById("lastLocation").innerText = data[0]?.location || "-";

  generateChart(data);
  generateReports(data);
}

// جدول
function displayData(data){
  const table = document.getElementById("data");
  table.innerHTML="";

  data.forEach(item=>{
    table.innerHTML+=`
    <tr>
      <td>${item.id}</td>
      <td>${item.name}</td>
      <td>${item.location}</td>
      <td>${item.comments}</td>
      <td>${item.created_at||"-"}</td>
    </tr>`;
  });
}

// chart
function generateChart(data){
  const loc={};
  data.forEach(i=>loc[i.location]=(loc[i.location]||0)+1);

  new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:Object.keys(loc),
      datasets:[{
        data:Object.values(loc),
        backgroundColor:"#16a34a"
      }]
    }
  });
}

// تقارير
function generateReports(data){
  const loc={};
  data.forEach(i=>loc[i.location]=(loc[i.location]||0)+1);

  new Chart(locationChart,{ type:"pie",
    data:{labels:Object.keys(loc),datasets:[{data:Object.values(loc)}]}
  });

  const dates={};
  data.forEach(i=>{
    const d=i.created_at?.split("T")[0];
    dates[d]=(dates[d]||0)+1;
  });

  new Chart(dateChart,{ type:"line",
    data:{labels:Object.keys(dates),datasets:[{data:Object.values(dates)}]}
  });

  new Chart(barChart,{ type:"bar",
    data:{labels:Object.keys(loc),datasets:[{data:Object.values(loc)}]}
  });
}

// التنقل
function showPage(p,e){
  dashboardPage.style.display="none";
  feedbackPage.style.display="none";
  reportsPage.style.display="none";

  document.querySelectorAll(".sidebar a")
    .forEach(a=>a.classList.remove("active"));
  e.classList.add("active");

  if(p==="dashboard")dashboardPage.style.display="block";
  if(p==="feedback")feedbackPage.style.display="block";
  if(p==="reports")reportsPage.style.display="block";
}

// اللغة
function toggleLang(){
  document.body.dir =
    document.body.dir === "rtl" ? "ltr" : "rtl";
}

loadData();

</script>

</body>
</html>
