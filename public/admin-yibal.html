<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDO YIBAL MOTEL Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Tahoma, sans-serif;
  background: #f4f6f9;
  display: flex;
}

.sidebar {
  width: 240px;
  background: #2b5dab;
  color: white;
  height: 100vh;
  position: fixed;
  padding: 20px;
  box-sizing: border-box;
}

.sidebar img {
  width: 120px;
  background: white;
  padding: 8px;
  border-radius: 10px;
  margin-bottom: 30px;
}

.sidebar a {
  display: block;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  cursor: pointer;
  text-decoration: none;
  color: white;
}

.sidebar a:hover,
.sidebar a.active {
  background: #16a34a;
}

.main {
  margin-left: 240px;
  width: calc(100% - 240px);
}

.header {
  background: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logout {
  background: #16a34a;
  color: white;
  border: none;
  padding: 8px 15px;
  border-radius: 6px;
  cursor: pointer;
}

.lang {
  cursor: pointer;
  color: #2b5dab;
  font-weight: bold;
  margin-right: 12px;
}

.content {
  padding: 20px;
}

.cards {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.card {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

.card h3 {
  margin-top: 0;
}

.card p {
  font-size: 24px;
  color: #16a34a;
  margin-bottom: 0;
}

.table-wrap {
  background: white;
  border-radius: 12px;
  overflow: hidden;
}

table {
  width: 100%;
  background: white;
  border-collapse: collapse;
}

th {
  background: #2b5dab;
  color: white;
  padding: 12px;
}

td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

.action-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

.export-btn {
  background: #16a34a;
  color: white;
  border: none;
  padding: 8px 15px;
  border-radius: 6px;
  cursor: pointer;
}

#notif {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #16a34a;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  display: none;
  z-index: 999;
}
</style>
</head>

<body>

<div id="notif">New Feedback Received 🚀</div>

<div class="sidebar">
  <img src="https://sakanoman.om/files/images/a8f7324ee2d9956f2f1e44022b4d2cda.png" alt="SAKAN Logo">
  <a class="active" onclick="showPage('dashboard', this)">Dashboard</a>
  <a onclick="showPage('feedback', this)">Feedback</a>
  <a onclick="showPage('reports', this)">Reports</a>
</div>

<div class="main">

  <div class="header">
    <h2 id="title">📊 PDO YIBAL MOTEL Dashboard</h2>
    <div>
      <span class="lang" onclick="toggleLang()">EN / AR</span>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="content">

    <!-- Dashboard -->
    <div id="dashboardPage">
      <div class="cards">
        <div class="card">
          <h3 id="totalText">عدد الطلبات</h3>
          <p id="total">0</p>
        </div>

        <div class="card">
          <h3 id="lastText">آخر موقع</h3>
          <p id="lastLocation">-</p>
        </div>
      </div>

      <div class="card">
        <canvas id="chart"></canvas>
      </div>
    </div>

    <!-- Feedback -->
    <div id="feedbackPage" style="display:none;">
      <div class="action-bar">
        <h2 id="feedbackTitle">📋 جميع الشكاوى</h2>
        <button class="export-btn" onclick="exportExcel()">Export Excel</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th id="nameCol">الاسم</th>
              <th id="locCol">الموقع</th>
              <th id="comCol">التعليق</th>
              <th id="dateCol">التاريخ</th>
            </tr>
          </thead>
          <tbody id="data"></tbody>
        </table>
      </div>
    </div>

    <!-- Reports -->
    <div id="reportsPage" style="display:none;">
      <h2 id="reportsTitle">📊 التقارير</h2>

      <div class="cards">
        <div class="card">
          <h3 id="report1">حسب الموقع</h3>
          <canvas id="locationChart"></canvas>
        </div>

        <div class="card">
          <h3 id="report2">يومي</h3>
          <canvas id="dateChart"></canvas>
        </div>
      </div>

      <div class="card">
        <h3 id="report3">مقارنة</h3>
        <canvas id="barChart"></canvas>
      </div>
    </div>

  </div>
</div>

<script>
if (localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}

function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

let allData = [];
let lastCount = 0;
let currentLang = "ar";
let mainChart = null;
let locationChartInstance = null;
let dateChartInstance = null;
let barChartInstance = null;

const siteName = "PDO YIBAL MOTEL";

async function loadData() {
  const res = await fetch(
    "https://sakan-feedback-app.onrender.com/feedback/" + encodeURIComponent(siteName)
  );
  const data = await res.json();

  allData = data;
  displayData(data);

  document.getElementById("total").innerText = data.length;
  document.getElementById("lastLocation").innerText = data[0]?.location || "-";

  generateChart(data);
  generateReports(data);

  lastCount = data.length;
}

function displayData(data) {
  const table = document.getElementById("data");
  table.innerHTML = "";

  data.forEach(item => {
    table.innerHTML += `
      <tr>
        <td>${item.id}</td>
        <td>${item.name || "-"}</td>
        <td>${item.location || "-"}</td>
        <td>${item.comments || "-"}</td>
        <td>${item.created_at || "-"}</td>
      </tr>
    `;
  });
}

function generateChart(data) {
  const loc = {};
  data.forEach(i => {
    const key = i.location || "Unknown";
    loc[key] = (loc[key] || 0) + 1;
  });

  if (mainChart) mainChart.destroy();

  mainChart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: Object.keys(loc),
      datasets: [{
        label: currentLang === "ar" ? "عدد البلاغات" : "Feedback Count",
        data: Object.values(loc),
        backgroundColor: "#16a34a"
      }]
    }
  });
}

function generateReports(data) {
  const loc = {};
  data.forEach(i => {
    const key = i.location || "Unknown";
    loc[key] = (loc[key] || 0) + 1;
  });

  const dates = {};
  data.forEach(i => {
    const d = i.created_at?.split("T")[0] || "Unknown";
    dates[d] = (dates[d] || 0) + 1;
  });

  if (locationChartInstance) locationChartInstance.destroy();
  if (dateChartInstance) dateChartInstance.destroy();
  if (barChartInstance) barChartInstance.destroy();

  locationChartInstance = new Chart(document.getElementById("locationChart"), {
    type: "pie",
    data: {
      labels: Object.keys(loc),
      datasets: [{
        data: Object.values(loc),
        backgroundColor: ["#16a34a", "#2b5dab", "#22c55e", "#60a5fa", "#86efac"]
      }]
    }
  });

  dateChartInstance = new Chart(document.getElementById("dateChart"), {
    type: "line",
    data: {
      labels: Object.keys(dates),
      datasets: [{
        label: currentLang === "ar" ? "عدد البلاغات" : "Feedback Count",
        data: Object.values(dates),
        borderColor: "#2b5dab",
        fill: false
      }]
    }
  });

  barChartInstance = new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
      labels: Object.keys(loc),
      datasets: [{
        label: currentLang === "ar" ? "عدد البلاغات" : "Feedback Count",
        data: Object.values(loc),
        backgroundColor: "#2b5dab"
      }]
    }
  });
}

function showPage(page, el) {
  document.getElementById("dashboardPage").style.display = "none";
  document.getElementById("feedbackPage").style.display = "none";
  document.getElementById("reportsPage").style.display = "none";

  document.querySelectorAll(".sidebar a").forEach(a => a.classList.remove("active"));
  el.classList.add("active");

  if (page === "dashboard") document.getElementById("dashboardPage").style.display = "block";
  if (page === "feedback") document.getElementById("feedbackPage").style.display = "block";
  if (page === "reports") document.getElementById("reportsPage").style.display = "block";
}

function toggleLang() {
  if (currentLang === "ar") {
    currentLang = "en";
    document.documentElement.lang = "en";
    document.body.dir = "ltr";

    document.getElementById("title").innerText = "📊 PDO YIBAL MOTEL Dashboard";
    document.getElementById("totalText").innerText = "Total Requests";
    document.getElementById("lastText").innerText = "Last Location";
    document.getElementById("feedbackTitle").innerText = "📋 All Feedback";
    document.getElementById("reportsTitle").innerText = "📊 Reports";
    document.getElementById("nameCol").innerText = "Name";
    document.getElementById("locCol").innerText = "Location";
    document.getElementById("comCol").innerText = "Comment";
    document.getElementById("dateCol").innerText = "Date";
    document.getElementById("report1").innerText = "By Location";
    document.getElementById("report2").innerText = "Daily";
    document.getElementById("report3").innerText = "Comparison";
  } else {
    location.reload();
  }

  displayData(allData);
  generateChart(allData);
  generateReports(allData);
}

function exportExcel() {
  let csv = "ID,Name,Location,Comments,Date\n";

  allData.forEach(i => {
    csv += `"${i.id}","${i.name || ""}","${i.location || ""}","${i.comments || ""}","${i.created_at || ""}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "PDO-YIBAL-MOTEL-feedback.csv";
  a.click();
}

async function checkNewFeedback() {
  const res = await fetch(
    "https://sakan-feedback-app.onrender.com/feedback/" + encodeURIComponent(siteName)
  );
  const data = await res.json();

  if (data.length > lastCount && lastCount !== 0) {
    showNotification();
  }

  lastCount = data.length;
}

function showNotification() {
  const notif = document.getElementById("notif");
  notif.style.display = "block";

  setTimeout(() => {
    notif.style.display = "none";
  }, 3000);
}

setInterval(checkNewFeedback, 10000);

loadData();
</script>

</body>
</html>
