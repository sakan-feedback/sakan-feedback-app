<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAKAN Feedback</title>

<style>
body {
  font-family: "Segoe UI", Tahoma;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  padding: 30px;
}

.container {
  background: white;
  width: 600px;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.logo {
  text-align: center;
  margin-bottom: 10px;
}

.logo img {
  width: 120px;
  background: white;
  padding: 8px;
  border-radius: 10px;
}

h2 {
  text-align: center;
  color: #2b5dab;
  margin-bottom: 20px;
}

label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}

.required {
  color: red;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

textarea {
  height: 100px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: linear-gradient(to right, #16a34a, #2b5dab);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.lang-switch {
  text-align: right;
  margin-bottom: 10px;
  cursor: pointer;
  color: #2b5dab;
}
</style>
</head>

<body>

<div class="container">

<div class="lang-switch" onclick="toggleLang()">🌐 EN / AR</div>

<div class="logo">
  <img src="https://sakanoman.om/files/images/a8f7324ee2d9956f2f1e44022b4d2cda.png">
</div>

<h2 id="title">استمارة الاقتراحات والشكاوي</h2>

<!-- ✅ الفورم الصحيح -->
<form onsubmit="send(event)">

<label id="categoryLabel">1. الفئة <span class="required">*</span></label>
<select id="category" required>
  <option value="">اختر مستوى الأهمية</option>
  <option>منخفض</option>
  <option>متوسط</option>
  <option>عالي</option>
</select>

<label id="typeLabel">2. نوع المشكلة <span class="required">*</span></label>
<select id="type" required>
  <option value="">اختر نوع المشكلة</option>
  <option>شكوى</option>
  <option>اقتراح</option>
</select>

<label id="descLabel">3. وصف المشكلة <span class="required">*</span></label>
<textarea id="comments" placeholder="صف المشكلة بالتفصيل..." required></textarea>

<label id="locationLabel">الموقع / القسم (اختياري)</label>
<input id="location" placeholder="أدخل الموقع أو القسم">

<h3 id="contactTitle">4. معلومات التواصل</h3>

<label id="nameLabel">الاسم <span class="required">*</span></label>
<input id="name" placeholder="الاسم" required>

<label id="phoneLabel">رقم الهاتف <span class="required">*</span></label>
<input id="phone" placeholder="رقم الهاتف" required>

<label id="roomLabel">رقم الغرفة (اختياري)</label>
<input id="room" placeholder="رقم الغرفة">

<label id="emailLabel">البريد الإلكتروني (اختياري)</label>
<input id="email" placeholder="البريد الإلكتروني">

<label id="empLabel">الرقم الوظيفي (اختياري)</label>
<input id="emp" placeholder="الرقم الوظيفي">

<button type="submit" id="submitBtn">إرسال البلاغ</button>

</form>

</div>

<script>
let isArabic = true;

function toggleLang() {
  isArabic = !isArabic;

  if (!isArabic) {
    document.body.dir = "ltr";
    title.innerText = "Feedback Form";
    categoryLabel.innerText = "1. Category *";
    typeLabel.innerText = "2. Type *";
    descLabel.innerText = "3. Description *";
    locationLabel.innerText = "Location / Department (Optional)";
    contactTitle.innerText = "4. Contact Information";
    nameLabel.innerText = "Name *";
    phoneLabel.innerText = "Phone Number *";
    roomLabel.innerText = "Room Number (Optional)";
    emailLabel.innerText = "Email (Optional)";
    empLabel.innerText = "Employee ID (Optional)";
    submitBtn.innerText = "Send Feedback";
  } else {
    location.reload();
  }
}

// ✅ إرسال البيانات بشكل صحيح
async function send(e) {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    location: document.getElementById("location").value,
    comments: document.getElementById("comments").value
  };

  await fetch("https://sakan-feedback-app.onrender.com/feedback", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  alert("تم الإرسال بنجاح ✅");
  document.querySelector("form").reset();
}
</script>

</body>
</html>
