<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAKAN Dashboard Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: "Segoe UI";
  background: #f4f6f9;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 240px;
  background: #2b5dab;
  color: white;
  height: 100vh;
  position: fixed;
  padding: 20px;
}

.sidebar img {
  width: 120px;
  background: white;
  padding: 8px;
  border-radius: 10px;
  margin-bottom: 30px;
}

.sidebar a {
  display: block;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.sidebar a:hover,
.sidebar a.active {
  background: #16a34a;
}

/* Main */
.main {
  margin-left: 240px;
  width: 100%;
}

/* Header */
.header {
  background: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logout {
  background: #16a34a;
  color: white;
  border: none;
  padding: 8px 15px;
  border-radius: 6px;
  cursor: pointer;
}

/* Content */
.content {
  padding: 20px;
}

/* Cards */
.cards {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
}

.card {
  flex: 1;
  background: white;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

.card p {
  font-size: 26px;
  color: #16a34a;
}

/* Table */
table {
  width: 100%;
  background: white;
  border-collapse: collapse;
  border-radius: 12px;
  overflow: hidden;
}

th {
  background: #2b5dab;
  color: white;
  padding: 12px;
}

td {
  padding: 10px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

tr:hover {
  background: #f0fdf4;
}

/* Notification */
#notif {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #16a34a;
  color: white;
  padding: 12px 20px;
  border-radius: 8px;
  display: none;
  z-index: 999;
}
</style>
</head>

<body>

<!-- إشعار -->
<div id="notif">New Feedback Received 🚀</div>

<!-- Sidebar -->
<div class="sidebar">
  <img src="https://sakanoman.om/files/images/a8f7324ee2d9956f2f1e44022b4d2cda.png">

  <a class="active" onclick="showPage('dashboard', this)">Dashboard</a>
  <a onclick="showPage('feedback', this)">Feedback</a>
  <a onclick="showPage('reports', this)">Reports</a>
</div>

<!-- Main -->
<div class="main">

<!-- Header -->
<div class="header">
  <h2>📊 SAKAN Dashboard</h2>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="content">

<!-- Dashboard -->
<div id="dashboardPage">
  <div class="cards">
    <div class="card">
      <h3>عدد الطلبات</h3>
      <p id="total">0</p>
    </div>

    <div class="card">
      <h3>آخر موقع</h3>
      <p id="lastLocation">-</p>
    </div>
  </div>

  <canvas id="chart"></canvas>
</div>

<!-- Feedback -->
<div id="feedbackPage" style="display:none;">
  <h2>📋 جميع الشكاوى</h2>

  <!-- زر Excel -->
  <button onclick="exportExcel()" style="margin-bottom:10px; background:#16a34a; color:white; border:none; padding:10px 15px; border-radius:6px;">
    📥 Export Excel
  </button>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>الاسم</th>
        <th>الموقع</th>
        <th>التعليق</th>
        <th>التاريخ</th>
      </tr>
    </thead>
    <tbody id="data"></tbody>
  </table>
</div>

<!-- Reports -->
<div id="reportsPage" style="display:none;">
  <h2>📊 التقارير</h2>
  <p>قريباً...</p>
</div>

</div>
</div>

<script>
// حماية الصفحة
if (localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}

// Logout
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

let allData = [];
let lastCount = 0;

// تحميل البيانات
async function loadData() {
  const res = await fetch("https://sakan-feedback-app.onrender.com/feedback");
  const data = await res.json();

  allData = data;
  displayData(data);

  document.getElementById("total").innerText = data.length;
  document.getElementById("lastLocation").innerText = data[0]?.location || "-";

  generateChart(data);
  lastCount = data.length;
}

// عرض الجدول
function displayData(data) {
  const table = document.getElementById("data");
  table.innerHTML = "";

  data.forEach(item => {
    table.innerHTML += `
      <tr>
        <td>${item.id}</td>
        <td>${item.name}</td>
        <td>${item.location}</td>
        <td>${item.comments}</td>
        <td>${item.created_at || "-"}</td>
      </tr>
    `;
  });
}

// Chart
function generateChart(data) {
  const locations = {};

  data.forEach(item => {
    locations[item.location] = (locations[item.location] || 0) + 1;
  });

  new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: Object.keys(locations),
      datasets: [{
        label: "عدد الشكاوى",
        data: Object.values(locations),
        backgroundColor: "#16a34a"
      }]
    }
  });
}

// Navigation
function showPage(page, el) {
  document.getElementById("dashboardPage").style.display = "none";
  document.getElementById("feedbackPage").style.display = "none";
  document.getElementById("reportsPage").style.display = "none";

  document.querySelectorAll(".sidebar a").forEach(link => link.classList.remove("active"));
  el.classList.add("active");

  if (page === "dashboard") document.getElementById("dashboardPage").style.display = "block";
  if (page === "feedback") document.getElementById("feedbackPage").style.display = "block";
  if (page === "reports") document.getElementById("reportsPage").style.display = "block";
}

// Export Excel
function exportExcel() {
  let csv = "ID,Name,Location,Comments,Date\n";

  allData.forEach(item => {
    csv += `${item.id},${item.name},${item.location},${item.comments},${item.created_at}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "sakan-feedback.csv";
  a.click();
}

// إشعارات
async function checkNewFeedback() {
  const res = await fetch("https://sakan-feedback-app.onrender.com/feedback");
  const data = await res.json();

  if (data.length > lastCount && lastCount !== 0) {
    showNotification();
  }

  lastCount = data.length;
}

function showNotification() {
  const notif = document.getElementById("notif");
  notif.style.display = "block";

  setTimeout(() => {
    notif.style.display = "none";
  }, 3000);
}

// كل 10 ثواني
setInterval(checkNewFeedback, 10000);

// تشغيل
loadData();
</script>

</body>
</html>
